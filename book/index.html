    let loggedInVisitor = null;
function togglePasswordVisibility(inputId, eyeId) {
  const input = document.getElementById(inputId);
  const eye = document.getElementById(eyeId);
  if (input.type === 'password') {
    input.type = 'text';
    eye.className = 'fas fa-eye-slash';
  } else {
    input.type = 'password';
    eye.className = 'fas fa-eye';
  }
}
function switchTab(tab) {
  if (tab === 'login') {
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('loginTab').style.background = '#6366F1';
    document.getElementById('registerTab').style.background = '#334155';
  } else {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'block';
    document.getElementById('loginTab').style.background = '#334155';
    document.getElementById('registerTab').style.background = '#6366F1';
  }
  document.getElementById('authError').style.display = 'none';
  document.getElementById('authSuccess').style.display = 'none';
}
async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value.trim();
  const errEl = document.getElementById('authError');
  if (!email || !password) {
    errEl.style.display = 'block';
    errEl.textContent = 'Please fill all fields.';
    return;
  }
  const data = await supabaseFetch(
    'visitors?email=eq.' +
    encodeURIComponent(email) +
    '&password=eq.' +
    encodeURIComponent(password)
  );
  if (!data.length) {
    errEl.style.display = 'block';
    errEl.textContent = 'Invalid email or password.';
    return;
  }
loggedInVisitor = data[0];
localStorage.setItem(
  'loggedInVisitor',
  JSON.stringify(loggedInVisitor)
);
showMainApp();
}
async function handleRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const designation = document.getElementById('regDesignation').value.trim();
  const password = document.getElementById('regPassword').value.trim();
  const errEl = document.getElementById('authError');
  const successEl = document.getElementById('authSuccess');
  errEl.style.display = 'none';
  successEl.style.display = 'none';
  if (!name || !email || !designation || !password) {
    errEl.style.display = 'block';
    errEl.textContent = 'Please fill all fields.';
    return;
  }
  if (!/\S+@\S+\.\S+/.test(email)) {
    errEl.style.display = 'block';
    errEl.textContent = 'Please enter a valid email.';
    return;
  }
  const existing = await supabaseFetch(
    'visitors?email=eq.' + encodeURIComponent(email)
  );
  if (existing.length) {
    errEl.style.display = 'block';
    errEl.textContent = 'Email already registered. Please login.';
    return;
  }
  await supabaseFetch('visitors', 'POST', {
    name,
    email,
    designation,
    password
  });
  successEl.style.display = 'block';
  successEl.textContent = 'Registration successful! Please login.';
  switchTab('login');
}

  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  if (loggedInVisitor) {
    document.getElementById('visitorName').value = loggedInVisitor.name;
    document.getElementById('visitorEmail').value = loggedInVisitor.email;

    if (pastEmail) {
      pastEmail.value = loggedInVisitor.email;

  }
  renderCalendar().catch(console.error);

    async function renderCalendar() {

pastBookedDates = Array.isArray(bookings) ? bookings.map(b => b.requested_date) : [];
console.log('Past booked dates:',pastBookedDates);

    async function selectDate(year, month, day) {

      const [scheduleSlots, bookingSlots] = await Promise.all([
  supabaseFetch('schedules?date=eq.' + dateStr + '&status=neq.cancelled'),
  supabaseFetch('booking_requests?requested_date=eq.' + dateStr + '&status=neq.declined')
]);
const slots = [...scheduleSlots, ...bookingSlots.map(b => ({
  start_time: b.start_time,
  end_time: b.end_time
}))];
      renderTimeline(slots, dateStr);

function getAvailableSlots(bookedSlots) {
  const available = [];
  for (let h = 5; h < 23; h++) {
    const start = String(h).padStart(2, '0') + ':00:00';
    const end = String(h + 1).padStart(2, '0') + ':00:00';
    const isBooked =
      bookedSlots.some(s =>
        s.start_time < end &&
        s.end_time > start
      );
    if (!isBooked) {
      available.push({
        start: start.slice(0, 5),
        end: end.slice(0, 5)
      });
    }
  }
  return available;
}
    function renderTimeline(bookedSlots, dateStr) {

    async function directWithdraw(id) {

  if (!confirm('Are you sure you want to withdraw this meeting request?')) return;
  try {
    const reqData = await supabaseFetch('booking_requests?id=eq.' + id);

    const r = reqData[0];
    await supabaseFetch('booking_requests?id=eq.' + id, 'PATCH', { status: 'withdrawn', withdrawal_reason: reason.trim() });
    const schedules = await supabaseFetch('schedules?date=eq.' + r.requested_date + '&start_time=eq.' + r.start_time + '&end_time=eq.' + r.end_time + '&visitor_email=eq.' + encodeURIComponent(r.visitor_email) + '&status=neq.cancelled');

      await supabaseFetch('schedules?id=eq.' + schedules[0].id, 'PATCH', { status: 'cancelled', cancel_reason: 'Withdrawn by visitor. Reason: ' + reason.trim() });
    }
    emailjs.send('service_88v685e', 'template_e4ekmie', {
      visitor_name: r.visitor_name, visitor_email: r.visitor_email, requested_date: r.requested_date,
      start_time: r.start_time.slice(0,5), end_time: r.end_time.slice(0,5),
      description: 'The visitor has withdrawn their meeting request. Reason: ' + reason.trim()
    });
    alert('Your request has been successfully withdrawn.');
    loadPastBookings();

      selectDate(selectedDate.getFullYear(), selectedDate.getMonth(), selectedDate.getDate());

        btn.style.background = '#334155';
      };

      visitorRecognition.onend = () => {
