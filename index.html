<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyScheduler</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0F172A;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
    }
    .card {
      background: #1E2938;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 40px;
      width: 360px;
      text-align: center;
    }
    h1 { color: #F1F5F9; font-size: 28px; margin-bottom: 8px; }
    p { color: #94A3B8; margin-bottom: 24px; }
    input {
      width: 100%;
      padding: 12px;
      background: #0F172A;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #F1F5F9;
      font-size: 16px;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      background: #6366F1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .error { color: #EF4444; margin-top: 12px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>MyScheduler</h1>
    <p>Enter your password to continue</p>
    <input type="password" id="password" placeholder="Password" />
    <button onclick="login()">Login</button>
    <p class="error" id="error">Wrong password. Try again.</p>
  </div>

  <script>
    function login() {
      const pwd = document.getElementById('password').value;
      if (pwd === 'myscheduler123') {
        sessionStorage.setItem('auth', 'true');
        window.location.href = '/owner';
      } else {
        document.getElementById('error').style.display = 'block';
      }
    }
  </script>
</body>
</html>
