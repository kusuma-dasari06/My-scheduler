<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <title>MyScheduler - Owner</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0F172A; font-family: Arial, sans-serif; color: #F1F5F9; }
    .header { background: #1E2938; border-bottom: 1px solid #334155; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { color: #6366F1; font-size: 20px; }
    .header-btns { display: flex; gap: 12px; align-items: center; }
    .btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; }
    .btn-primary { background: #6366F1; color: white; }
    .btn-secondary { background: #334155; color: #F1F5F9; }
    .badge { background: #EF4444; color: white; border-radius: 50%; padding: 2px 6px; font-size: 11px; margin-left: 4px; }
    .layout { display: grid; grid-template-columns: 320px 1fr 320px; height: calc(100vh - 60px); }
    .panel { border-right: 1px solid #334155; padding: 16px; overflow-y: auto; }
    .panel:last-child { border-right: none; }
    .panel h2 { font-size: 16px; color: #94A3B8; margin-bottom: 16px; }
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .calendar-header button { background: #334155; color: #F1F5F9; border: none; padding: 4px 10px; border-radius: 6px; cursor: pointer; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; }
    .day-name { color: #94A3B8; font-size: 12px; padding: 4px; }
    .day { padding: 6px; border-radius: 6px; font-size: 13px; cursor: pointer; }
    .day:hover { background: #334155; }
    .day.today { background: #6366F1; color: white; }
    .day.selected { background: #4F46E5; color: white; }
    .day.empty { cursor: default; }
    .slot-card { background: #1E2938; border: 1px solid #334155; border-radius: 8px; padding: 12px; margin-bottom: 12px; border-left: 4px solid #6366F1; }
    .slot-card.completed { border-left-color: #22C55E; opacity: 0.7; }
    .slot-card.cancelled { border-left-color: #EF4444; opacity: 0.7; }
    .slot-card.rescheduled { border-left-color: #F59E0B; }
    .slot-title-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
    .slot-title { font-weight: bold; }
    .btn-reason { background: #334155; color: #94A3B8; border: none; padding: 2px 8px; border-radius: 6px; cursor: pointer; font-size: 11px; white-space: nowrap; }
    .btn-reason:hover { background: #475569; color: #F1F5F9; }
    .slot-reason-box { display: none; background: #0F172A; border: 1px solid #334155; border-radius: 6px; padding: 8px 10px; font-size: 12px; color: #CBD5E1; margin-bottom: 8px; }
    .slot-reason-box.active { display: block; }
    .slot-time { color: #94A3B8; font-size: 13px; margin-bottom: 4px; }
    .slot-category { display: inline-block; background: #334155; padding: 2px 8px; border-radius: 12px; font-size: 11px; margin-bottom: 8px; }
    .slot-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .slot-actions button { padding: 4px 10px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; }
    .btn-complete { background: #22C55E; color: white; }
    .btn-edit { background: #3B82F6; color: white; }
    .btn-reschedule { background: #F59E0B; color: white; }
    .btn-cancel { background: #EF4444; color: white; }
    .status-counts { display: flex; gap: 12px; margin-top: 16px; padding-top: 16px; border-top: 1px solid #334155; }
    .count-item { text-align: center; flex: 1; }
    .count-num { font-size: 24px; font-weight: bold; }
    .count-label { font-size: 11px; color: #94A3B8; }
    .count-item.completed .count-num { color: #22C55E; }
    .count-item.rescheduled .count-num { color: #F59E0B; }
    .count-item.cancelled .count-num { color: #EF4444; }
    .chat-messages { height: calc(100vh - 220px); overflow-y: auto; margin-bottom: 12px; }
    .message { margin-bottom: 12px; display: flex; flex-direction: column; }
    .message.user { align-items: flex-end; }
    .message.ai { align-items: flex-start; }
    .message-bubble { padding: 10px 14px; border-radius: 12px; max-width: 85%; font-size: 14px; }
    .message.user .message-bubble { background: #6366F1; color: white; }
    .message.ai .message-bubble { background: #1E2938; color: #F1F5F9; }
    .chat-input { display: flex; gap: 8px; }
    .chat-input input { flex: 1; padding: 10px; background: #1E2938; border: 1px solid #334155; border-radius: 8px; color: #F1F5F9; font-size: 14px; }
    .chat-input button { padding: 10px 16px; background: #6366F1; color: white; border: none; border-radius: 8px; cursor: pointer; }
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: #1E2938; border: 1px solid #334155; border-radius: 12px; padding: 24px; width: 480px; max-height: 90vh; overflow-y: auto; }
    .modal h3 { margin-bottom: 16px; color: #F1F5F9; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; color: #94A3B8; font-size: 13px; margin-bottom: 6px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; background: #0F172A; border: 1px solid #334155; border-radius: 8px; color: #F1F5F9; font-size: 14px; }
    .form-group textarea { height: 80px; resize: vertical; }
    .word-count { font-size: 11px; color: #94A3B8; margin-top: 4px; }
    .word-count.error { color: #EF4444; }
    .modal-btns { display: flex; gap: 12px; justify-content: flex-end; }
    .error-msg { color: #EF4444; font-size: 13px; margin-bottom: 12px; display: none; }
    @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .panel { border-right: none; border-bottom: 1px solid #334155; } }
  </style>
</head>
<body>
  <div class="header">
    <h1>MyScheduler</h1>
    <div class="header-btns">
      <button class="btn btn-secondary" onclick="copyBookingLink()">Copy Booking Link</button>
      <button class="btn btn-secondary" onclick="openRequestsDrawer()">Requests <span class="badge" id="badge">0</span></button>
      <button class="btn btn-primary" onclick="openAddSlot()">+ Add to Schedule</button>
    </div>
  </div>
  <div class="layout">
    <div class="panel">
      <h2>Calendar</h2>
      <div class="calendar-header">
        <button onclick="changeMonth(-1)">&#8592;</button>
        <span id="monthYear"></span>
        <button onclick="changeMonth(1)">&#8594;</button>
      </div>
      <div class="calendar-grid" id="calendarGrid"></div>
      <button class="btn btn-secondary" style="width:100%; margin-top:12px;" onclick="openChatHistory()">📜 Chat History</button>
    </div>
    <div class="panel">
      <h2>Schedule for <span id="selectedDateLabel">Today</span></h2>
      <div id="slotsContainer"><p style="color:#94A3B8">Select a date to view slots.</p></div>
      <div class="status-counts">
        <div class="count-item completed"><div class="count-num" id="countCompleted">0</div><div class="count-label">Completed</div></div>
        <div class="count-item rescheduled"><div class="count-num" id="countRescheduled">0</div><div class="count-label">Rescheduled</div></div>
        <div class="count-item cancelled"><div class="count-num" id="countCancelled">0</div><div class="count-label">Cancelled</div></div>
      </div>
    </div>
    <div class="panel">
      <h2>AI Assistant</h2>
      <div class="chat-messages" id="chatMessages">
        <div class="message ai"><div class="message-bubble">Hi! I'm your scheduling assistant. Ask me anything about your schedule!</div></div>
      </div>
      <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Ask something..." onkeydown="if(event.key==='Enter') sendMessage()" />
        <button onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>
<div class="modal-overlay" id="chatHistoryModal">
  <div class="modal" style="width:500px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h3>Chat History</h3>
      <button class="btn btn-secondary" onclick="closeChatHistory()">Close</button>
    </div>
    <input type="date" id="chatHistoryDate" onchange="loadChatHistoryForDate()" style="width:100%; padding:10px; background:#0F172A; border:1px solid #334155; border-radius:8px; color:#F1F5F9; margin-bottom:16px;" />
    <div id="chatHistoryContainer" style="max-height:400px; overflow-y:auto;"></div>
  </div>
</div>
  <div class="modal-overlay" id="addSlotModal">
    <div class="modal">
      <h3>Add to Schedule</h3>
      <div class="error-msg" id="slotError"></div>
      <div class="form-group">
        <label>Category</label>
        <select id="slotCategory">
          <option>Meeting</option>
          <option>Brainstorming</option>
          <option>Event Participation</option>
          <option>Learnings</option>
          <option>Others</option>
        </select>
      </div>
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="slotTitle" placeholder="Enter title" />
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="slotDate" />
      </div>
      <div class="form-group">
        <label>Start Time (IST, min 5:00 AM)</label>
        <input type="time" id="slotStart" min="05:00" max="23:00" />
      </div>
      <div class="form-group">
        <label>End Time (IST, max 11:00 PM)</label>
        <input type="time" id="slotEnd" min="05:00" max="23:00" />
      </div>
      <div class="form-group">
        <label>Description (min 25 words)</label>
        <textarea id="slotDesc" oninput="updateWordCount()" placeholder="Describe this slot..."></textarea>
        <div class="word-count" id="wordCount">0 / 25 words minimum</div>
      </div>
      <div class="modal-btns">
        <button class="btn btn-secondary" onclick="closeAddSlot()">Cancel</button>
        <button class="btn btn-primary" onclick="submitSlot()">Add Slot</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="requestsDrawer">
    <div class="modal" style="width:560px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h3>Booking Requests</h3>
        <button class="btn btn-secondary" onclick="closeRequestsDrawer()">Close</button>
      </div>
      <div id="requestsContainer"><p style="color:#94A3B8">Loading...</p></div>
    </div>
  </div>

  <div class="modal-overlay" id="remarksModal">
    <div class="modal" style="width:400px">
      <h3 id="remarksTitle">Add Remarks</h3>
      <div class="form-group">
        <label>Your Message</label>
        <textarea id="remarksText" style="height:100px"></textarea>
      </div>
      <div class="modal-btns">
        <button class="btn btn-secondary" onclick="closeRemarksModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitRemarks()">Send</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://xkxlzffwmzxbuiyglnvz.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhreGx6ZmZ3bXp4YnVpeWdsbnZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExNTE4ODAsImV4cCI6MjA5NjcyNzg4MH0.o055hpZ23PVUGezvB3sXwWQhj4BsAXi7QoJhrdcG20o';
    const EMAILJS_SERVICE = 'service_88v685e';
    const EMAILJS_PUBLIC = 'o0EwTVp7WtONi-e8k';
    const TEMPLATE_VISITOR = 'template_u0x07ob';

    if (!sessionStorage.getItem('auth')) window.location.href = '/';

    emailjs.init(EMAILJS_PUBLIC);

    let currentDate = new Date();
    let selectedDate = null;
    let chatHistory = [];
    let currentRemarkAction = null;
    let currentRemarkRequestId = null;
    let currentRemarkEmail = null;
    let currentRemarkDate = null;
    let currentRemarkStart = null;
    let currentRemarkEnd = null;
    let currentRemarkName = null;

    async function supabaseFetch(path, method = 'GET', body = null) {
      const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
        method,
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json',
          'Prefer': method === 'POST' ? 'return=representation' : ''
        },
        body: body ? JSON.stringify(body) : null
      });
      const text = await res.text();
      return text ? JSON.parse(text) : {};
    }

    async function loadSlots(dateStr) {
      const data = await supabaseFetch('schedules?date=eq.' + dateStr + '&order=start_time');
      renderSlots(data);
      loadStatusCounts();
    }

    async function loadStatusCounts() {
      const completed = await supabaseFetch('schedules?status=eq.completed&select=id');
      const rescheduled = await supabaseFetch('schedules?status=eq.rescheduled&select=id');
      const cancelled = await supabaseFetch('schedules?status=eq.cancelled&select=id');
      document.getElementById('countCompleted').textContent = completed.length || 0;
      document.getElementById('countRescheduled').textContent = rescheduled.length || 0;
      document.getElementById('countCancelled').textContent = cancelled.length || 0;
    }

    function toIST(timeStr) { return timeStr ? timeStr.slice(0,5) : ''; }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function toggleReason(id) {
      const box = document.getElementById('reason-' + id);
      if (box) box.classList.toggle('active');
    }

    function renderSlots(slots) {
      const container = document.getElementById('slotsContainer');
      if (!slots || !slots.length) { container.innerHTML = '<p style="color:#94A3B8">No slots for this date.</p>'; return; }
      container.innerHTML = slots.map(s => `
        <div class="slot-card ${s.status}">
          <div class="slot-title-row">
            <div class="slot-title">${s.title}</div>
            <button class="btn-reason" onclick="toggleReason('${s.id}')">📝 Reason</button>
          </div>
          <div class="slot-reason-box" id="reason-${s.id}">${escapeHtml(s.description) || 'No reason provided.'}</div>
          <div class="slot-time">${toIST(s.start_time)} — ${toIST(s.end_time)} IST</div>
          <div class="slot-category">${s.category}</div>
          <div class="slot-actions">
            ${(s.status === 'upcoming' || s.status === 'rescheduled') ? `
              <button class="btn-complete" onclick="updateStatus('${s.id}', 'completed')">Complete</button>
              <button class="btn-edit" onclick="editSlot('${s.id}')">Edit</button>
              <button class="btn-reschedule" onclick="rescheduleSlot('${s.id}')">Reschedule</button>
              <button class="btn-cancel" onclick="cancelSlot('${s.id}')">Cancel</button>
            ` : `<span style="color:#94A3B8;font-size:12px">${s.status}</span>`}
          </div>
        </div>
      `).join('');
    }

    async function updateStatus(id, status) {
      if (!confirm('Are you sure?')) return;
      await supabaseFetch('schedules?id=eq.' + id, 'PATCH', { status });
      reloadSlots();
    }

    async function cancelSlot(id) {
      if (!confirm('Cancel this slot?')) return;
      await supabaseFetch('schedules?id=eq.' + id, 'PATCH', { status: 'cancelled' });
      reloadSlots();
    }

    function reloadSlots() {
      if (selectedDate) {
        const y = selectedDate.getFullYear();
        const m = String(selectedDate.getMonth()+1).padStart(2,'0');
        const d = String(selectedDate.getDate()).padStart(2,'0');
        loadSlots(`${y}-${m}-${d}`);
      }
    }

    async function editSlot(id) {
      const newTitle = prompt('Enter new title:');
      if (!newTitle) return;
      await supabaseFetch('schedules?id=eq.' + id, 'PATCH', { title: newTitle });
      reloadSlots();
    }
    async function rescheduleSlot(id) {
      const newDate = prompt('Enter new date (YYYY-MM-DD):');
      if (!newDate) return;
      const rawStart = prompt('Enter new start time (HH:MM, 24hr):');
      if (!rawStart) return;
      const rawEnd = prompt('Enter new end time (HH:MM, 24hr):');
      if (!rawEnd) return;
      const newStart = normalizeTime(rawStart);
      const newEnd = normalizeTime(rawEnd);

      const existing = await supabaseFetch('schedules?date=eq.' + newDate + '&status=neq.cancelled');
      const overlap = existing.find(s => s.id !== id && !(newEnd <= s.start_time || newStart >= s.end_time));
      if (overlap) { alert('This time overlaps with an existing slot!'); return; }

      await supabaseFetch('schedules?id=eq.' + id, 'PATCH', {
        date: newDate, start_time: newStart, end_time: newEnd, status: 'rescheduled'
      });
      reloadSlots(); loadStatusCounts();
    }

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      document.getElementById('monthYear').textContent = monthNames[month] + ' ' + year;
      const grid = document.getElementById('calendarGrid');
      grid.innerHTML = '';
      ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
        const el = document.createElement('div');
        el.className = 'day-name';
        el.textContent = d;
        grid.appendChild(el);
      });
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const today = new Date();
      for (let i = 0; i < firstDay; i++) {
        const el = document.createElement('div'); el.className = 'day empty'; grid.appendChild(el);
      }
      for (let d = 1; d <= daysInMonth; d++) {
        const el = document.createElement('div');
        el.className = 'day';
        el.textContent = d;
        if (today.getFullYear() === year && today.getMonth() === month && today.getDate() === d) el.classList.add('today');
        if (selectedDate && selectedDate.getFullYear() === year && selectedDate.getMonth() === month && selectedDate.getDate() === d) el.classList.add('selected');
        el.onclick = () => selectDate(year, month, d);
        grid.appendChild(el);
      }
    }

    function changeMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); renderCalendar(); }

    function selectDate(year, month, day) {
      selectedDate = new Date(year, month, day);
      document.getElementById('selectedDateLabel').textContent = selectedDate.toDateString();
      document.getElementById('slotDate').value = selectedDate.toISOString().split('T')[0];
      reloadSlots();
      renderCalendar();
    }

    function copyBookingLink() {
      navigator.clipboard.writeText(window.location.origin + '/book');
      alert('Link copied!');
    }

    function openAddSlot() { document.getElementById('addSlotModal').classList.add('active'); }
    function closeAddSlot() { document.getElementById('addSlotModal').classList.remove('active'); }

    function updateWordCount() {
      const words = document.getElementById('slotDesc').value.trim().split(/\s+/).filter(w => w).length;
      const el = document.getElementById('wordCount');
      el.textContent = words + ' / 25 words minimum';
      el.className = 'word-count' + (words < 25 ? ' error' : '');
    }

    async function submitSlot() {
      const title = document.getElementById('slotTitle').value.trim();
      const date = document.getElementById('slotDate').value;
      const start = document.getElementById('slotStart').value;
      const end = document.getElementById('slotEnd').value;
      const desc = document.getElementById('slotDesc').value.trim();
      const category = document.getElementById('slotCategory').value;
      const words = desc.split(/\s+/).filter(w => w).length;
      const errEl = document.getElementById('slotError');

      if (!title || !date || !start || !end || !desc) { errEl.style.display='block'; errEl.textContent='Please fill all fields.'; return; }
      if (words < 25) { errEl.style.display='block'; errEl.textContent='Description must be at least 25 words.'; return; }
      if (start >= end) { errEl.style.display='block'; errEl.textContent='End time must be after start time.'; return; }
      if (start < '05:00') { errEl.style.display='block'; errEl.textContent='Start time must be after 5:00 AM.'; return; }
      if (end > '23:00') { errEl.style.display='block'; errEl.textContent='End time must be before 11:00 PM.'; return; }

      const existing = await supabaseFetch('schedules?date=eq.' + date + '&status=neq.cancelled');
      const overlap = existing.find(s => !(end <= s.start_time || start >= s.end_time));
      if (overlap) { errEl.style.display='block'; errEl.textContent='This time overlaps with an existing slot!'; return; }

      errEl.style.display = 'none';
      await supabaseFetch('schedules', 'POST', { title, date, start_time: start, end_time: end, description: desc, category, status: 'upcoming', created_by: 'owner' });
      closeAddSlot();
      reloadSlots();
    }

    function normalizeTime(t) {
      if (!t) return t;
      t = t.trim();
      const match = t.match(/^(\d{1,2})(:(\d{2}))?\s*(am|pm|AM|PM)?$/);
      if (!match) return t;
      let hour = parseInt(match[1], 10);
      const min = match[3] || '00';
      const meridian = match[4] ? match[4].toLowerCase() : null;
      if (meridian === 'pm' && hour < 12) hour += 12;
      if (meridian === 'am' && hour === 12) hour = 0;
      return String(hour).padStart(2, '0') + ':' + min;
    }

    async function sendMessage() {
      const input = document.getElementById('chatInput');
      const msg = input.value.trim();
      if (!msg) return;
      const container = document.getElementById('chatMessages');
      container.innerHTML += `<div class="message user"><div class="message-bubble">${msg}</div></div>`;
      const chatDate = new Date();
const chatDateStr = chatDate.getFullYear() + '-' + String(chatDate.getMonth()+1).padStart(2,'0') + '-' + String(chatDate.getDate()).padStart(2,'0');
await supabaseFetch('chat_history', 'POST', { date: chatDateStr, role: 'user', message: msg });
      input.value = '';
      container.scrollTop = container.scrollHeight;

      const today = new Date();
      const y = today.getFullYear();
      const m = String(today.getMonth()+1).padStart(2,'0');
      const d = String(today.getDate()).padStart(2,'0');
      const todayStr = `${y}-${m}-${d}`;
      const slots = await supabaseFetch('schedules?status=neq.cancelled&order=date,start_time');
      const pending = await supabaseFetch('booking_requests?status=eq.pending');

      const systemPrompt = `You are MyScheduler AI assistant for the owner. Today is ${todayStr} IST. Working hours: 5AM to 11PM IST.

All upcoming/active schedule slots (with their id, title, date, start_time, end_time, status): ${JSON.stringify(slots)}
Pending booking requests: ${JSON.stringify(pending)}

You can have a normal friendly conversation (greetings, small talk) and also help manage the schedule. Reply in plain text only, no stars, no markdown formatting. Keep replies short and directly answer only what was asked — do not add extra information, suggestions, or explanations unless the owner specifically asks for them.

When the owner asks something general like "hi" or "how are you", just reply normally and naturally with a short reply.

When the owner wants to book/add a new slot, first collect title, date, start time, end time, and a short description if missing, then confirm with the owner before acting. Once confirmed, reply with EXACTLY this on its own line, with times in strict 24-hour HH:MM format (e.g. 18:00, never 6pm or 6:00 PM):
[ACTION:BOOK:title:date:HH:MM:HH:MM]

When the owner wants to cancel a slot, identify the correct slot id from the schedule data above based on what they describe (e.g. "my 3pm meeting" or "tomorrow's call"), confirm with the owner, then once confirmed reply with EXACTLY:
[ACTION:CANCEL:slot_id]

When the owner wants to edit a slot's title or description, identify the slot id, confirm the new title with the owner, then once confirmed reply with EXACTLY:
[ACTION:EDIT:slot_id:new_title]

When the owner wants to reschedule a slot to a new date/time, identify the slot id, confirm the new date and time with the owner, then once confirmed reply with EXACTLY this, with times in strict 24-hour HH:MM format (e.g. 18:00, never 6pm or 6:00 PM):
[ACTION:RESCHEDULE:slot_id:new_date:HH:MM:HH:MM]

When the owner wants to mark a slot as completed/done, identify the slot id, confirm with the owner, then once confirmed reply with EXACTLY:
[ACTION:COMPLETE:slot_id]

CRITICAL: All times inside ACTION tags MUST be in 24-hour HH:MM format only (e.g. 06:00, 13:00, 18:00). Never write 6pm, 6:00 PM, or 6 PM inside an ACTION tag. Convert any time the owner mentions (like "6pm" or "6 in the evening") to 24-hour format before writing the ACTION tag.

If multiple slots match the owner's description, ask which one they mean before taking action. Never take an action without the owner's explicit confirmation in the conversation.`;

      chatHistory.push({ role: 'user', parts: [{ text: msg }] });
      if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);

      const loadingId = 'loading-' + Date.now();
      container.innerHTML += `<div class="message ai" id="${loadingId}"><div class="message-bubble">Thinking...</div></div>`;
      container.scrollTop = container.scrollHeight;

      try {
        const res = await fetch('/api/gemini', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ systemPrompt, messages: chatHistory })
        });
        const data = await res.json();
        document.getElementById(loadingId)?.remove();
        const reply = data.reply || 'Sorry, I could not process that.';
        chatHistory.push({ role: 'model', parts: [{ text: reply }] });

        if (reply.includes('[ACTION:CANCEL:')) {
          const match = reply.match(/\[ACTION:CANCEL:([^\]]+)\]/);
          if (match) {
            await supabaseFetch('schedules?id=eq.' + match[1], 'PATCH', { status: 'cancelled' });
            reloadSlots(); loadStatusCounts();
          }
        }
        if (reply.includes('[ACTION:BOOK:')) {
          const match = reply.match(/\[ACTION:BOOK:([^:]+):([^:]+):(\d{1,2}:\d{2}\s*[APMapm]*):(\d{1,2}:\d{2}\s*[APMapm]*)\]/);
          if (match) {
            const newStart = normalizeTime(match[3]);
            const newEnd = normalizeTime(match[4]);
            await supabaseFetch('schedules', 'POST', {
              title: match[1], date: match[2], start_time: newStart, end_time: newEnd,
              description: 'Booked via AI', category: 'Meeting', status: 'upcoming', created_by: 'owner'
            });
            reloadSlots();
          }
        }
        if (reply.includes('[ACTION:EDIT:')) {
          const match = reply.match(/\[ACTION:EDIT:([^:]+):([^\]]+)\]/);
          if (match) {
            await supabaseFetch('schedules?id=eq.' + match[1], 'PATCH', { title: match[2] });
            reloadSlots();
          }
        }
        if (reply.includes('[ACTION:RESCHEDULE:')) {
          const match = reply.match(/\[ACTION:RESCHEDULE:([^:]+):([^:]+):(\d{1,2}:\d{2}\s*[APMapm]*):(\d{1,2}:\d{2}\s*[APMapm]*)\]/);
          console.log('RESCHEDULE match:', match);
          if (match) {
            const newStart = normalizeTime(match[3]);
            const newEnd = normalizeTime(match[4]);
            const updateResult = await supabaseFetch('schedules?id=eq.' + match[1], 'PATCH', {
              date: match[2], start_time: newStart, end_time: newEnd, status: 'rescheduled'
            });
            console.log('RESCHEDULE update result:', updateResult);
            reloadSlots(); loadStatusCounts();
          }
        }
        if (reply.includes('[ACTION:COMPLETE:')) {
          const match = reply.match(/\[ACTION:COMPLETE:([^\]]+)\]/);
          if (match) {
            await supabaseFetch('schedules?id=eq.' + match[1], 'PATCH', { status: 'completed' });
            reloadSlots(); loadStatusCounts();
          }
        }

        const cleanReply = reply.replace(/\[ACTION:[^\]]+\]/g, '').trim();
        container.innerHTML += `<div class="message ai"><div class="message-bubble">${cleanReply}</div></div>`;
        await supabaseFetch('chat_history', 'POST', { date: chatDateStr, role: 'ai', message: cleanReply });
        container.scrollTop = container.scrollHeight;
      } catch(e) {
        document.getElementById(loadingId)?.remove();
        container.innerHTML += `<div class="message ai"><div class="message-bubble">Error connecting to AI.</div></div>`;
        container.scrollTop = container.scrollHeight;
      }
    }

    async function loadPendingCount() {
      const data = await supabaseFetch('booking_requests?status=eq.pending&select=id');
      document.getElementById('badge').textContent = data.length || 0;
    }

    function openRequestsDrawer() {
      document.getElementById('requestsDrawer').classList.add('active');
      loadRequests();
    }

    function closeRequestsDrawer() {
      document.getElementById('requestsDrawer').classList.remove('active');
    }

    async function loadRequests() {
      const container = document.getElementById('requestsContainer');
      container.innerHTML = '<p style="color:#94A3B8">Loading...</p>';
      const data = await supabaseFetch('booking_requests?order=created_at.desc');
      if (!data.length) { container.innerHTML = '<p style="color:#94A3B8">No requests yet.</p>'; return; }
      container.innerHTML = data.map(r => `
        <div style="background:#0F172A;border:1px solid #334155;border-radius:8px;padding:12px;margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px">
            <span style="font-weight:bold">${r.visitor_name}</span>
            <span style="color:#94A3B8;font-size:11px">${r.status.replace(/_/g,' ')}</span>
          </div>
          <div style="font-size:13px;color:#94A3B8;margin-bottom:4px">${r.visitor_email}</div>
          <div style="font-size:13px;margin-bottom:4px">${r.requested_date} | ${r.start_time.slice(0,5)} — ${r.end_time.slice(0,5)}</div>
          <div style="font-size:13px;margin-bottom:12px;color:#CBD5E1">${r.description}</div>
          ${r.status === 'pending' ? `
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-primary" style="font-size:12px;padding:6px 12px" onclick="acceptRequest('${r.id}','${r.visitor_email}','${r.requested_date}','${r.start_time}','${r.end_time}','${r.visitor_name}')">Accept</button>
            <button class="btn" style="font-size:12px;padding:6px 12px;background:#22C55E;color:white" onclick="openRemarks('accept_remarks','${r.id}','${r.visitor_email}','${r.requested_date}','${r.start_time}','${r.end_time}','${r.visitor_name}')">Accept with Remarks</button>
            <button class="btn" style="font-size:12px;padding:6px 12px;background:#F59E0B;color:white" onclick="openRemarks('reschedule','${r.id}','${r.visitor_email}')">Request Reschedule</button>
            <button class="btn" style="font-size:12px;padding:6px 12px;background:#EF4444;color:white" onclick="openRemarks('decline','${r.id}','${r.visitor_email}')">Decline</button>
          </div>` : `<div style="font-size:12px;color:#94A3B8">Remarks: ${r.owner_remarks || '—'}</div>`}
        </div>
      `).join('');
    }

    async function acceptRequest(id, email, date, start, end, name) {
      if (!confirm('Accept this request?')) return;
      await supabaseFetch('booking_requests?id=eq.' + id, 'PATCH', { status: 'accepted' });
      await supabaseFetch('schedules', 'POST', {
        title: 'Meeting with ' + name, date, start_time: start, end_time: end,
        description: 'Visitor booking', category: 'Meeting', status: 'upcoming', created_by: 'visitor'
      });
      emailjs.send(EMAILJS_SERVICE, TEMPLATE_VISITOR, {
        visitor_name: name, visitor_email: email, requested_date: date,
        start_time: start, end_time: end, description: 'Your meeting request has been accepted!'
      });
      loadRequests();
      loadPendingCount();
    }

    function openRemarks(action, id, email, date, start, end, name) {
      currentRemarkAction = action;
      currentRemarkRequestId = id;
      currentRemarkEmail = email;
      currentRemarkDate = date;
      currentRemarkStart = start;
      currentRemarkEnd = end;
      currentRemarkName = name;
      const titles = { 'accept_remarks': 'Accept with Remarks', 'reschedule': 'Request Reschedule', 'decline': 'Decline Request' };
      document.getElementById('remarksTitle').textContent = titles[action];
      document.getElementById('remarksText').value = '';
      document.getElementById('remarksModal').classList.add('active');
    }

    function closeRemarksModal() { document.getElementById('remarksModal').classList.remove('active'); }
function openChatHistory() {
  document.getElementById('chatHistoryModal').classList.add('active');
  const today = new Date();
  const todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  document.getElementById('chatHistoryDate').value = todayStr;
  loadChatHistoryForDate();
}

function closeChatHistory() {
  document.getElementById('chatHistoryModal').classList.remove('active');
}

async function loadChatHistoryForDate() {
  const date = document.getElementById('chatHistoryDate').value;
  const container = document.getElementById('chatHistoryContainer');
  container.innerHTML = '<p style="color:#94A3B8">Loading...</p>';
  const data = await supabaseFetch('chat_history?date=eq.' + date + '&order=created_at.asc');
  if (!data.length) { container.innerHTML = '<p style="color:#94A3B8">No chat history for this date.</p>'; return; }
  container.innerHTML = data.map(m => `
    <div class="message ${m.role === 'user' ? 'user' : 'ai'}">
      <div class="message-bubble">${m.message}</div>
    </div>
  `).join('');
}
    async function submitRemarks() {
      const remarks = document.getElementById('remarksText').value.trim();
      if (currentRemarkAction === 'accept_remarks') {
        await supabaseFetch('booking_requests?id=eq.' + currentRemarkRequestId, 'PATCH', { status: 'accepted_with_remarks', owner_remarks: remarks });
        await supabaseFetch('schedules', 'POST', {
          title: 'Meeting with ' + currentRemarkName, date: currentRemarkDate,
          start_time: currentRemarkStart, end_time: currentRemarkEnd,
          description: 'Visitor booking', category: 'Meeting', status: 'upcoming', created_by: 'visitor'
        });
        emailjs.send(EMAILJS_SERVICE, TEMPLATE_VISITOR, {
          visitor_name: currentRemarkName, visitor_email: currentRemarkEmail,
          requested_date: currentRemarkDate, start_time: currentRemarkStart,
          end_time: currentRemarkEnd, description: 'Accepted with remarks: ' + remarks
        });
      } else if (currentRemarkAction === 'reschedule') {
        await supabaseFetch('booking_requests?id=eq.' + currentRemarkRequestId, 'PATCH', { status: 'reschedule_requested', owner_remarks: remarks });
        emailjs.send(EMAILJS_SERVICE, TEMPLATE_VISITOR, {
          visitor_name: currentRemarkName || 'Visitor', visitor_email: currentRemarkEmail,
          requested_date: '', start_time: '', end_time: '',
          description: 'Reschedule requested: ' + remarks
        });
      } else if (currentRemarkAction === 'decline') {
        await supabaseFetch('booking_requests?id=eq.' + currentRemarkRequestId, 'PATCH', { status: 'declined', owner_remarks: remarks });
        emailjs.send(EMAILJS_SERVICE, TEMPLATE_VISITOR, {
          visitor_name: currentRemarkName || 'Visitor', visitor_email: currentRemarkEmail,
          requested_date: '', start_time: '', end_time: '',
          description: 'Request declined. Reason: ' + remarks
        });
      }
      closeRemarksModal();
      loadRequests();
      loadPendingCount();
    }

    renderCalendar();
    loadStatusCounts();
    loadPendingCount();
    const today = new Date();
    selectDate(today.getFullYear(), today.getMonth(), today.getDate());
  </script>
